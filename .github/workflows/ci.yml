name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: client (VS Code extension)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run compile
      - run: npm test

  server:
    name: server (Cloudflare Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  desktop:
    name: desktop (Electron menu-bar app)
    runs-on: ubuntu-latest
    env:
      # Typecheck/bundle only — the Electron binary is never launched in CI.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            client/package-lock.json
      # desktop imports client/src/services + models directly, so client deps are needed for types.
      - run: npm ci
        working-directory: client
      - run: npm ci
        working-directory: desktop
      - run: npm run typecheck
        working-directory: desktop
      - run: npm run compile
        working-directory: desktop
